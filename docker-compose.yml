services:
  mirofish:
    build:
      context: .
      dockerfile: Dockerfile
    image: mirofish-arabic:local
    container_name: mirofish-arabic
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/health', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./backend/uploads:/app/backend/uploads
